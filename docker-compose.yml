services:
  redis:
    image: redis:7-alpine
    restart: always
    profiles: [dev, prod]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    profiles: [dev]
    restart: always
    env_file: .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME:-fettle_dev}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: dev
    profiles: [dev]
    restart: always
    env_file: .env.dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: .
      target: dev
    profiles: [dev]
    command: celery -A project worker -l info -P gevent
    restart: always
    env_file: .env.dev
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web-prod:
    build:
      context: .
      target: prod
    profiles: [prod]
    restart: always
    env_file: .env.prod
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  celery-prod:
    build:
      context: .
      target: prod
    profiles: [prod]
    command: celery -A project worker -l info -P gevent
    restart: always
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata_dev:
